name: Build and Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.event.head_commit.message, 'release')
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Read package version
        id: package
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Install dependencies
        run: npm install

      - name: Build with electron-builder
        run: npm run dist

      - name: Upload artifacts to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.yml
            release/*.blockmap
          tag_name: v${{ steps.package.outputs.version }}
          generate_release_notes: false
          body: |
            ## v${{ steps.package.outputs.version }}

            ### 中文

            此版本新增键盘快捷键，用于快速调整编辑器字体大小。现在可以直接通过键盘放大或缩小字体，不必再移动到工具栏按钮。

            #### 下载

            | 文件 | 说明 |
            |------|------|
            | `*-setup.exe` | **安装版（推荐）**：提供安装向导并创建桌面快捷方式 |
            | `*-portable.exe` | **便携版**：无需安装，可直接运行 |

            #### 更新亮点

            - 新增 <kbd>Ctrl</kbd> + <kbd>=</kbd> 放大编辑器字体。
            - 新增 <kbd>Ctrl</kbd> + <kbd>-</kbd> 缩小编辑器字体。
            - 工具栏字体按钮提示和欢迎页快捷键表已同步更新。
            - 字体大小仍会保存到本地设置，下次启动继续沿用。

            ### English

            This release adds keyboard shortcuts for quickly adjusting the editor font size. You can now increase or decrease the font directly from the keyboard without moving to the toolbar buttons.

            #### Downloads

            | File | Description |
            |------|-------------|
            | `*-setup.exe` | **Installer (recommended)**: includes a setup wizard and desktop shortcut |
            | `*-portable.exe` | **Portable build**: runs directly without installation |

            #### Highlights

            - Add <kbd>Ctrl</kbd> + <kbd>=</kbd> to increase the editor font size.
            - Add <kbd>Ctrl</kbd> + <kbd>-</kbd> to decrease the editor font size.
            - Update toolbar hints and the welcome screen shortcut table.
            - Font size is still saved locally and restored on the next launch.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
