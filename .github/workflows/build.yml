name: Build and Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.event.head_commit.message, 'release')
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Read package version
        id: package
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Install dependencies
        run: npm install

      - name: Build with electron-builder
        run: npm run dist

      - name: Upload artifacts to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.yml
            release/*.blockmap
          tag_name: v${{ steps.package.outputs.version }}
          generate_release_notes: false
          body: |
            ## v${{ steps.package.outputs.version }}

            ### 中文

            此版本增强了大纲导航体验：在不同工作模式下滚动文档时，大纲会自动高亮当前显示内容所属的章节标题，让长文档定位更直观。

            #### 下载

            | 文件 | 说明 |
            |------|------|
            | `*-setup.exe` | **安装版（推荐）**：提供安装向导并创建桌面快捷方式 |
            | `*-portable.exe` | **便携版**：无需安装，可直接运行 |

            #### 更新亮点

            - 新增大纲当前章节自动高亮。
            - 支持单栏预览、双栏编辑和源码编辑模式下的滚动章节识别。
            - 优化重复标题场景下的大纲定位，点击和高亮会对应到正确章节。
            - 切换工作模式或重新渲染预览后，大纲高亮会自动刷新。

            ### English

            This release improves outline navigation. While scrolling documents in different work modes, the outline now automatically highlights the section currently shown in the editor or preview, making long documents easier to navigate.

            #### Downloads

            | File | Description |
            |------|-------------|
            | `*-setup.exe` | **Installer (recommended)**: includes a setup wizard and desktop shortcut |
            | `*-portable.exe` | **Portable build**: runs directly without installation |

            #### Highlights

            - Add automatic current-section highlighting in the outline.
            - Support section detection in single preview, split editing, and source editing modes.
            - Improve outline targeting when duplicate heading titles are present.
            - Refresh the outline highlight after mode switches or preview re-renders.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
