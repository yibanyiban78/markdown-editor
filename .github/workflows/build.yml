name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    if: ${{ !endsWith(github.ref_name, '-android') }}
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build with electron-builder
        run: npm run dist

      - name: Upload artifacts to Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
          generate_release_notes: false
          body: |
            ## Download

            Download the installer below and double-click to install.

            | File | Description |
            |------|-------------|
            | `极简Markdown编辑器-v版本号-setup.exe` | Installer (recommended) — creates desktop shortcut |
            | `极简Markdown编辑器-v版本号-portable.exe` | Portable — extract and run, no install needed |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
