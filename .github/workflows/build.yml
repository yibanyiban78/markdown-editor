name: Build and Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.event.head_commit.message, 'release: v1.0.2')
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build with electron-builder
        run: npm run dist

      - name: Upload artifacts to Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
          tag_name: v1.0.2
          generate_release_notes: false
          body: |
            ## v1.0.2

            This release hardens Markdown rendering and Electron file access, fixes data-loss risks around unsaved documents and auto-save, moves all runtime libraries offline, and rebuilds HTML/PDF export.

            | File | Description |
            |------|-------------|
            | `极简Markdown编辑器-v1.0.2-setup.exe` | Installer (recommended) — creates desktop shortcut |
            | `极简Markdown编辑器-v1.0.2-portable.exe` | Portable — no installation required |

            ### Highlights

            - Sanitize untrusted Markdown and restrict Electron IPC file access.
            - Protect unsaved documents and fix auto-save race conditions.
            - Bundle Markdown, KaTeX, Mermaid, highlighting, and sanitization libraries locally.
            - Export clean standalone HTML and document-only PDF files.
            - Upgrade Electron and build dependencies; dependency audit reports zero vulnerabilities.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
