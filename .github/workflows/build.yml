name: Build and Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.event.head_commit.message, 'release')
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Read package version
        id: package
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Install dependencies
        run: npm install

      - name: Build with electron-builder
        run: npm run dist

      - name: Upload artifacts to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.yml
            release/*.blockmap
          tag_name: v${{ steps.package.outputs.version }}
          generate_release_notes: false
          body: |
            ## v${{ steps.package.outputs.version }}

            ### 中文

            此版本加入基于 GitHub Releases 的新版本检测与自动更新能力。安装版启动后会自动检查新版本，也可以通过工具栏手动检查；发现更新后可下载新版安装包，并在确认没有未保存内容后重启安装。

            #### 下载

            | 文件 | 说明 |
            |------|------|
            | `*-setup.exe` | **安装版（推荐）**：提供安装向导并创建桌面快捷方式 |
            | `*-portable.exe` | **便携版**：无需安装，可直接运行 |

            #### 更新亮点

            - 新增启动后的后台版本检测。
            - 新增工具栏“检查更新”入口。
            - 发现新版本后可在应用内下载更新。
            - 下载完成后会先检查未保存内容，再重启并安装更新。
            - 发布流程会上传 `latest.yml` 和 `.blockmap`，供自动更新客户端识别最新安装包。

            ### English

            This release adds GitHub Releases based update checking and automatic update support. The installed app checks for new versions in the background after startup, and users can also check manually from the toolbar. When an update is available, the app can download the new installer and restart to install it after unsaved work is handled.

            #### Downloads

            | File | Description |
            |------|-------------|
            | `*-setup.exe` | **Installer (recommended)**: includes a setup wizard and desktop shortcut |
            | `*-portable.exe` | **Portable build**: runs directly without installation |

            #### Highlights

            - Add background update checks after startup.
            - Add a toolbar action for manual update checks.
            - Allow users to download updates from inside the app.
            - Before restarting to install an update, protect unsaved work.
            - Upload `latest.yml` and `.blockmap` files in the release workflow so update clients can resolve the latest installer.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
