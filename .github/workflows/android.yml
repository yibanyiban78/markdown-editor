name: Build Android APK

on:
  push:
    tags:
      - 'v*.*.*-android'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Initialize Capacitor Android
        run: |
          npx cap init 极简Markdown编辑器 com.armd.markdowneditor --web-dir src
          npx cap add android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: markdown-editor-android
          path: android/app/build/outputs/apk/debug/*.apk

      - name: Upload APK to Release (if tagged)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/*.apk
          body: |
            ## Android APK Download

            Download `app-debug.apk` and install it on your Android device.

            > ⚠️ You may need to enable "Install from unknown sources" in Settings.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
